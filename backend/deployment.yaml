apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: python:3.11-slim
          command: ["sh", "-c", "pip install flask --quiet && python /app/app.py"]
          envFrom:
            - configMapRef:
                name: backend-config
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: app-code
              mountPath: /app
          resources:
            requests:
              cpu: "100m"
              memory: "100Mi"
            limits:
              cpu: "250m"
              memory: "200Mi"
      volumes:
        - name: app-code
          configMap:
            name: backend-code
